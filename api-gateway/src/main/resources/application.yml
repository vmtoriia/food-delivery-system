server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: catalog-service
          uri: ${CATALOG_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/restaurants/**, /menu-items/**

        - id: order-service
          uri: ${ORDER_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/orders/**

        - id: delivery-service
          uri: ${DELIVERY_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/couriers/**

        - id: user-service
          uri: ${USER_SERVICE_URL:http://localhost:8085}
          predicates:
            - Path=/customers/**