name: Build and Push Microservices

on:
  push:
    branches:
      - main

jobs:
  build-and-push-order-service:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_VMTORIIA }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build order-service image
        run: |
          cd order-service
          docker build -t ${{ secrets.DOCKER_VMTORIIA }}/my-order-service:1.0 .

      - name: Push order-service image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/my-order-service:1.0