name: Build and Push Microservices

on:
  push:
    branches:
      - main

jobs:
  build-and-push-order-service:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_VMTORIIA }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build order-service image
        run: |
          cd order-service
          docker build -t ${{ secrets.DOCKER_VMTORIIA }}/my-order-service:1.0 .
          docker push ${{ secrets.DOCKER_VMTORIIA }}/my-order-service:1.0

      - name: Build catalog-service image
        run: |
          cd catalog-service
          docker build -t ${{ secrets.DOCKER_VMTORIIA }}/my-catalog-service:1.0 .  
          docker push ${{ secrets.DOCKER_VMTORIIA }}/my-catalog-service:1.0
          
      - name: Build delivery-service image
        run: |
          cd delivery-service
          docker build -t ${{ secrets.DOCKER_VMTORIIA }}/my-delivery-service:1.0 .  
          docker push ${{ secrets.DOCKER_VMTORIIA }}/my-delivery-service:1.0

      - name: Build notification-service image
        run: |
          cd notification-service
          docker build -t ${{ secrets.DOCKER_VMTORIIA }}/my-notification-service:1.0 .  
          docker push ${{ secrets.DOCKER_VMTORIIA }}/my-notification-service:1.0          

      - name: Build user-service image
        run: |
          cd user-service
          docker build -t ${{ secrets.DOCKER_VMTORIIA }}/my-user-service:1.0 .  
          docker push ${{ secrets.DOCKER_VMTORIIA }}/my-user-service:1.0

      - name: Build and Push api-gateway
        run: |
          cd api-gateway
          docker build -t ${{ secrets.DOCKER_VMTORIIA }}/my-api-gateway:1.0 .
          docker push ${{ secrets.DOCKER_VMTORIIA }}/my-api-gateway:1.0
          
          

