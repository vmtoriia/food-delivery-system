apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: vmtoriia/my-api-gateway:1.0
          ports:
            - containerPort: 8080
          # I inject the Kubernetes internal DNS names here!
          env:
            - name: CATALOG_SERVICE_URL
              value: http://catalog-service:8081
            - name: ORDER_SERVICE_URL
              value: http://order-service:8082
            - name: DELIVERY_SERVICE_URL
              value: http://delivery-service:8084
            - name: USER_SERVICE_URL
              value: http://user-service:8085
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
spec:
  # This is my true Front Door!
  type: LoadBalancer
  selector:
    app: api-gateway
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080