version: '3'
services:

  postgres:
    image: postgres:16
    container_name: nss-postgres
    environment:
      POSTGRES_DB: smart_food
      POSTGRES_USER: nss
      POSTGRES_PASSWORD: nss
    ports:
      - "5434:5432"
    volumes:
      - nss_pg_data:/var/lib/postgresql/data


  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.4
    container_name: nss-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "22181:2181"


  kafka:
    image: confluentinc/cp-kafka:7.4.4
    container_name: nss-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

volumes:
  nss_pg_data: